<!DOCTYPE html>
<html>

<head>
    <title>Admin Panel - Smart Queue</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="header text-center p-3 bg-dark text-white">
    <h1>Admin Panel</h1>
</div>

<div class="container mt-4">

    <div class="text-center mb-4">
        <a href="/reset">
            <button class="btn btn-danger">Reset Entire Queue</button>
        </a>
    </div>

    <div class="row">

        {% for counter, queue in counters.items() %}

        <div class="col-md-3">
            <div class="card p-3 m-2 text-center">

                <h4>{{ counter }}</h4>

                <p><strong>Now Serving:</strong>
                    {% if serving[counter] %}
                        Token {{ serving[counter] }}
                    {% else %}
                        Waiting
                    {% endif %}
                </p>

                <p><strong>People in Queue:</strong> {{ queue|length }}</p>

                <ul class="list-group mb-2">
                    {% for token in queue %}
                        <li class="list-group-item">Token {{ token }}</li>
                    {% endfor %}
                </ul>

                <a href="/next/{{ counter }}">
                    <button class="btn btn-primary">Call Next</button>
                </a>

            </div>
        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
